<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Radio Victoria 97.7 FM</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #1e1e2e;
      --gold:      #c9a84c;
      --gold-dim:  #8a6f2e;
      --white:     #f0ede6;
      --muted:     #6b6b80;
      --on:        #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* Ambient glow behind card */
    body::before {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    .freq-badge {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      border-radius: 999px;
      padding: 0.25rem 1rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 4.5rem);
      letter-spacing: 0.05em;
      line-height: 0.95;
      color: var(--white);
      margin-bottom: 0.3rem;
    }

    h1 span {
      color: var(--gold);
    }

    .tagline {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    /* Visualizer bars */
    .visualizer {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 48px;
      margin-bottom: 2rem;
    }

    .bar {
      width: 4px;
      background: var(--gold);
      border-radius: 2px;
      opacity: 0.3;
      transition: height 0.1s;
    }

    .playing .bar { opacity: 1; }
    .playing .bar:nth-child(1)  { animation: bounce 0.9s ease-in-out infinite; }
    .playing .bar:nth-child(2)  { animation: bounce 0.7s ease-in-out infinite 0.1s; }
    .playing .bar:nth-child(3)  { animation: bounce 1.1s ease-in-out infinite 0.2s; }
    .playing .bar:nth-child(4)  { animation: bounce 0.8s ease-in-out infinite 0.05s; }
    .playing .bar:nth-child(5)  { animation: bounce 1.0s ease-in-out infinite 0.15s; }
    .playing .bar:nth-child(6)  { animation: bounce 0.75s ease-in-out infinite 0.3s; }
    .playing .bar:nth-child(7)  { animation: bounce 0.95s ease-in-out infinite 0.1s; }
    .playing .bar:nth-child(8)  { animation: bounce 1.2s ease-in-out infinite 0.25s; }
    .playing .bar:nth-child(9)  { animation: bounce 0.85s ease-in-out infinite 0.0s; }
    .playing .bar:nth-child(10) { animation: bounce 1.05s ease-in-out infinite 0.2s; }

    @keyframes bounce {
      0%, 100% { height: 6px; }
      50%       { height: 38px; }
    }

    /* Play button */
    .play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      transition: background 0.2s, transform 0.15s;
      outline: none;
    }

    .play-btn:hover  { background: rgba(201,168,76,0.1); transform: scale(1.05); }
    .play-btn:active { transform: scale(0.97); }

    .play-btn svg { width: 28px; height: 28px; fill: var(--gold); }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .dot.live { background: var(--on); box-shadow: 0 0 8px var(--on); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .volume-row svg { width: 16px; height: 16px; fill: var(--muted); flex-shrink: 0; }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
    }

    /* Footer */
    .footer {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    audio { display: none; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="freq-badge">97.7 FM</div>
    <h1>RADIO<br/><span>VICTORIA</span></h1>
    <p class="tagline">Transmitiendo en vivo</p>

    <div class="visualizer" id="viz">
      <div class="bar" style="height:12px"></div>
      <div class="bar" style="height:20px"></div>
      <div class="bar" style="height:8px"></div>
      <div class="bar" style="height:30px"></div>
      <div class="bar" style="height:16px"></div>
      <div class="bar" style="height:24px"></div>
      <div class="bar" style="height:10px"></div>
      <div class="bar" style="height:28px"></div>
      <div class="bar" style="height:14px"></div>
      <div class="bar" style="height:22px"></div>
    </div>

    <button class="play-btn" id="playBtn" aria-label="Reproducir">
      <!-- Play icon -->
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <!-- Pause icon (hidden) -->
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <div class="status">
      <div class="dot live" id="dot"></div>
      <span id="statusText">En vivo</span>
    </div>

    <div class="volume-row">
      <!-- Volume low icon -->
      <svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8"/>
    </div>

    <p class="footer">© Radio Victoria — Todos los derechos reservados</p>
  </div>

  <audio id="player" preload="none">
    <source src="https://least-papua-sells-gilbert.trycloudflare.com/radio.mp3" type="audio/mpeg"/>
  </audio>

  <script>
    const player   = document.getElementById('player');
    const btn      = document.getElementById('playBtn');
    const iconPlay  = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const viz      = document.getElementById('viz');
    const dot      = document.getElementById('dot');
    const statusTxt = document.getElementById('statusText');
    const vol      = document.getElementById('vol');

    let playing = false;

    btn.addEventListener('click', () => {
      if (!playing) {
        player.load();
        player.play().catch(() => {
          statusTxt.textContent = 'Error al conectar';
        });
      } else {
        player.pause();
        setPlaying(false);
      }
    });

    player.addEventListener('playing', () => setPlaying(true));
    player.addEventListener('pause',   () => setPlaying(false));
    player.addEventListener('error',   () => {
      statusTxt.textContent = 'Sin señal';
      dot.classList.remove('live');
      setPlaying(false);
    });
    player.addEventListener('waiting', () => { statusTxt.textContent = 'Conectando…'; });

    vol.addEventListener('input', () => { player.volume = vol.value; });

    function setPlaying(state) {
      playing = state;
      iconPlay.style.display  = state ? 'none'  : '';
      iconPause.style.display = state ? ''      : 'none';
      viz.classList.toggle('playing', state);
      dot.classList.toggle('live', state);
      statusTxt.textContent = state ? 'En vivo' : 'Pausado';
    }
  </script>
</body>
</html>
